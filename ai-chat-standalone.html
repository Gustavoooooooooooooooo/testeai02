<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ AI Chat Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      height: 100vh;
      overflow: hidden;
      color: #e0e0e0;
    }

    .container {
      display: flex;
      height: 100vh;
      background: linear-gradient(to bottom, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background-color: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
      transition: all 0.3s ease;
    }

    .sidebar.hidden {
      display: none;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .close-sidebar-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 20px;
      padding: 0;
    }

    .new-chat-btn {
      padding: 10px 16px;
      background-color: rgba(99, 102, 241, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.5);
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .new-chat-btn:hover {
      background-color: rgba(99, 102, 241, 1);
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideInUp 0.3s ease-out;
    }

    .chat-item-btn {
      flex: 1;
      padding: 10px 12px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #999;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      font-size: 13px;
      text-align: left;
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .chat-item-btn.active {
      background-color: rgba(99, 102, 241, 0.3);
      color: #6366f1;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .delete-btn:hover {
      color: #ff6b6b;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to bottom, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background-color: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .menu-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 20px;
      padding: 0;
      margin-right: 16px;
      display: none;
    }

    @media (max-width: 768px) {
      .menu-btn {
        display: block;
      }
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        z-index: 1000;
      }
      .sidebar.hidden {
        display: none;
      }
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      flex: 1;
    }

    /* MESSAGES */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages-container::-webkit-scrollbar {
      width: 8px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #666;
    }

    .empty-icon {
      font-size: 48px;
      animation: pulse 2s ease-in-out infinite;
    }

    .empty-title {
      font-size: 24px;
      font-weight: 600;
      color: #ccc;
      margin: 0;
    }

    .empty-text {
      font-size: 14px;
      color: #666;
      margin: 0;
    }

    .message-wrapper {
      display: flex;
      animation: slideInUp 0.4s ease-out;
    }

    .message-wrapper.user {
      justify-content: flex-end;
    }

    .message-wrapper.assistant {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.5;
    }

    .message-bubble.user {
      background-color: rgba(99, 102, 241, 0.8);
      border-color: rgba(99, 102, 241, 0.5);
      color: #fff;
    }

    .message-bubble.assistant {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      color: #e0e0e0;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      height: 8px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #666;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* INPUT */
    .input-area {
      padding: 20px 24px;
      background-color: rgba(15, 23, 42, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input {
      flex: 1;
      padding: 12px 16px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input:focus {
      background-color: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn {
      padding: 10px 14px;
      background-color: rgba(99, 102, 241, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.5);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-family: inherit;
      min-width: 44px;
      height: 44px;
    }

    .send-btn:hover:not(:disabled) {
      background-color: rgba(99, 102, 241, 1);
      border-color: rgba(99, 102, 241, 0.8);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ANIMATIONS */
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Histórico</h2>
        <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
      </div>

      <button class="new-chat-btn" onclick="startNewChat()">+ Novo Chat</button>

      <div class="chat-list" id="chatList"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- HEADER -->
      <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1 class="header-title">✨ AI Assistant</h1>
        <div style="flex: 1;"></div>
      </div>

      <!-- MESSAGES -->
      <div class="messages-container" id="messagesContainer">
        <div class="empty-state">
          <div class="empty-icon">🤖</div>
          <h2 class="empty-title">Bem-vindo ao AI Assistant</h2>
          <p class="empty-text">Comece uma conversa e veja a magia acontecer</p>
        </div>
      </div>

      <!-- INPUT -->
      <form class="input-area" onsubmit="sendMessage(event)">
        <div class="input-wrapper">
          <input
            type="text"
            class="input"
            id="messageInput"
            placeholder="Escreva sua mensagem..."
            autocomplete="off"
          />
          <button
            type="submit"
            class="send-btn"
            id="sendBtn"
            title="Enviar mensagem"
          >
            ➤
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ========== CONFIGURAÇÃO ==========
    // MUDE AQUI: Cole sua URL do webhook
    const WEBHOOK_URL = 'https://hook.us2.make.com/yvbfo2qneb8eu4cxrlyykgbjt5u2ci52';
    // Ou para Make.com:
    // const WEBHOOK_URL = 'https://hook.make.com/seu-webhook-aqui';

    // ========== STATE ==========
    let messages = [];
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
    let currentChatId = null;
    let isLoading = false;
    let showSidebar = true;

    // ========== FUNCTIONS ==========

    function sendMessage(event) {
      event.preventDefault();
      const input = document.getElementById('messageInput');
      const message = input.value.trim();

      if (!message || isLoading) return;

      // Add user message
      messages.push({ role: 'user', content: message });
      input.value = '';
      renderMessages();
      scrollToBottom();

      isLoading = true;
      updateSendButton();

      // Send to webhook
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: message,
          conversationId: currentChatId || Date.now(),
          timestamp: new Date().toISOString(),
        }),
      })
        .then((res) => res.json())
        .then((data) => {
          const response = data.response || '❌ Erro ao processar mensagem';
          messages.push({ role: 'assistant', content: response });
          renderMessages();
          scrollToBottom();

          // Save to history
          if (!currentChatId) {
            const chatId = Date.now();
            currentChatId = chatId;
            chatHistory.push({
              id: chatId,
              title: message.substring(0, 30) + (message.length > 30 ? '...' : ''),
              messages: [...messages],
              createdAt: new Date().toISOString(),
            });
          } else {
            const chat = chatHistory.find((c) => c.id === currentChatId);
            if (chat) chat.messages = [...messages];
          }

          saveChatHistory();
          renderChatList();
        })
        .catch((error) => {
          console.error('Erro:', error);
          messages.push({
            role: 'assistant',
            content:
              '❌ Erro na conexão. Verifique a URL do webhook e se o servidor está rodando.',
          });
          renderMessages();
          scrollToBottom();
        })
        .finally(() => {
          isLoading = false;
          updateSendButton();
        });
    }

    function renderMessages() {
      const container = document.getElementById('messagesContainer');

      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🤖</div>
            <h2 class="empty-title">Bem-vindo ao AI Assistant</h2>
            <p class="empty-text">Comece uma conversa e veja a magia acontecer</p>
          </div>
        `;
        return;
      }

      let html = '';
      messages.forEach((msg) => {
        const isUser = msg.role === 'user';
        html += `
          <div class="message-wrapper ${isUser ? 'user' : 'assistant'}">
            <div class="message-bubble ${isUser ? 'user' : 'assistant'}">
              ${msg.content}
            </div>
          </div>
        `;
      });

      if (isLoading) {
        html += `
          <div class="message-wrapper assistant">
            <div class="message-bubble assistant">
              <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
              </div>
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function renderChatList() {
      const list = document.getElementById('chatList');

      if (chatHistory.length === 0) {
        list.innerHTML =
          '<p style="color: #666; font-size: 12px; text-align: center;">Nenhum histórico</p>';
        return;
      }

      list.innerHTML = chatHistory
        .map(
          (chat) => `
        <div class="chat-item">
          <button
            class="chat-item-btn ${currentChatId === chat.id ? 'active' : ''}"
            onclick="loadChat(${chat.id})"
            title="${chat.title}"
          >
            💬 ${chat.title}
          </button>
          <button
            class="delete-btn"
            onclick="deleteChat(${chat.id})"
            title="Deletar"
          >
            🗑️
          </button>
        </div>
      `
        )
        .join('');
    }

    function loadChat(chatId) {
      const chat = chatHistory.find((c) => c.id === chatId);
      if (chat) {
        messages = [...chat.messages];
        currentChatId = chatId;
        renderMessages();
        renderChatList();
        scrollToBottom();
      }
    }

    function deleteChat(chatId) {
      chatHistory = chatHistory.filter((c) => c.id !== chatId);
      saveChatHistory();
      if (currentChatId === chatId) {
        startNewChat();
      }
      renderChatList();
    }

    function startNewChat() {
      messages = [];
      currentChatId = null;
      renderMessages();
      renderChatList();
      document.getElementById('messageInput').focus();
    }

    function saveChatHistory() {
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    }

    function toggleSidebar() {
      showSidebar = !showSidebar;
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('hidden', !showSidebar);
    }

    function updateSendButton() {
      const btn = document.getElementById('sendBtn');
      const input = document.getElementById('messageInput');
      btn.disabled = isLoading || !input.value.trim();
    }

    function scrollToBottom() {
      const container = document.getElementById('messagesContainer');
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 0);
    }

    // ========== INIT ==========
    renderChatList();
    document.getElementById('messageInput').addEventListener(
      'input',
      updateSendButton
    );
    updateSendButton();
  </script>
</body>
</html>
